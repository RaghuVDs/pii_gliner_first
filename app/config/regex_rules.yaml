EMAIL_ADDRESS:
  - '([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})'

PHONE_NUMBER:
  - '(?<!\d)((?:\+?1[-.\s]?)?(?:\(?\d{3}\)?[-.\s]?)\d{3}[-.\s]?\d{4})(?!\d)'
  - '(?<!\d)(\d{3}-\d{4})(?!\d)' # New 7-digit support

SSN:
  - '(?<!\d)(\d{3}-\d{2}-\d{4})(?!\d)'

IP_ADDRESS:
  - '(?<!\d)((?:\d{1,3}\.){3}\d{1,3})(?!\d)'

CARD_EXPIRATION_DATE:
  - '\b((?:0[1-9]|1[0-2])/\d{2})\b(?!/\d{2,4})'

MR_NUMBER:
  - '(?i)(?:MR Account|MR Number)?\s*(\d{4}-\d{4}-\d{4}-\d{4})'

FICO_SCORE:
  - '(?i)(?:credit score of |fico score of |score of )\s*(\d{3})\b'

BAND_LEVEL:
  - '(?i)(?:band\s*level\s*)(\d+)\b'

EMPLOYEE_ID:
  - '(?i)(?:emp\s*id|employee\s*id|id)\s*#?\s*([0-9]{5,10})\b'

PASSWORD:
  - '(?i)(?:password\s+)([^\s]+?)(?=\.\s|\.$|\s|$)'

ROUTING_NUMBER:
  - '(?<!\d)((?:0[0-9]|1[0-2]|2[1-9]|3[0-2])\d{7})(?!\d)'

BANK_ACCOUNT_NUMBER:
  - '(?i)(?:Account:\s*)([0-9]{8,17})\b'

DEVICE_APP_DATA:
  - '(?i)(iPhone\s*[^,]*|iOS\s*[\d.]+|MAC\s*Address\s*[:A-F0-9]+)'
  - '(?i)\b(iPhone\s+[\w\s]+)\b'
  - '(?i)\b(iOS\s+[\d.]+)\b'
  - '\b([0-9A-F]{2}(?::[0-9A-F]{2}){5})\b'

# Fixed: Added \b before the street types to prevent matching "have" or "stare"
STREET_ADDRESS:
  - '(?i)(\d{1,5}\s+[A-Za-z0-9\s.,]+\b(?:Street|St|Avenue|Ave|Road|Rd|Boulevard|Blvd|Lane|Ln|Drive|Dr|Court|Ct|Circle|Cir)\b(?:[\s,]+[A-Za-z\s]+[\s,]+[A-Za-z]{2}[\s,]+\d{5})?)'

CARD_SECURITY_CODE:
  - '(?i)(?:CID|CVV|CVC)\s*(?<!\d)(\d{3,4})(?!\d)'

PIN:
  - '(?i)(?:pin|passcode|ivr)\s*(?<!\d)(\d{4,6})(?!\d)'

TRACK_DATA:
  - '(%[B|b][0-9]{12,19}\^[^^]+\^[0-9]{4,}\?)'

EMPLOYER_NAME:
  - '(?i)(?:works for|employed by)[ \t]+([A-Z][a-zA-Z0-9 .,&''-]+?)(?=\.|$|\n)'

PHI:
  - '(?i)(Type \d Diabetes|macular degeneration|cancer|hiv|aids)'

NATIONALITY:
  - '(?i)(?:citizenship in the\s+|citizen of\s+)([A-Z][a-zA-Z\s]+(?:and\s+[A-Z][a-zA-Z\s]+)?)'

SEXUAL_ORIENTATION:
  - '(?i)\b(same-sex|bisexual|heterosexual|homosexual|gay|lesbian)\b'

TICKET_NUMBER:
  - '(?i)(?:record\s*locator|confirmation\s*code|pnr|ticket\s*number)\s*#?\s*:?\s*([A-Z0-9]{6}|\d{13})\b'

IBAN:
  - '\b([A-Z]{2}[0-9]{2}[a-zA-Z0-9]{4}[0-9]{7}([a-zA-Z0-9]?){0,16})\b'

CRYPTO_WALLET:
  - '\b(1[a-km-zA-HJ-NP-Z1-9]{25,34})\b'
  - '\b(3[a-km-zA-HJ-NP-Z1-9]{25,34})\b'
  - '\b(bc1[a-zA-HJ-NP-Z0-9]{25,39})\b'
  - '\b(0x[a-fA-F0-9]{40})\b'

CREDIT_CARD_NUMBER:
  - '(?<!\d)(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|6(?:011|5[0-9][0-9])[0-9]{12})(?!\d)'

URL:
  - '(?i)\b(https?://[^\s()<>]+(?:\([\w\d]+\)|([^[:punct:]\s]|/)))'

TAX_ID_EIN:
  - '\b(\d{2}-\d{7})\b'

PARTIAL_CREDIT_CARD:
  - '(?i)(?:ending in\s*|last \d of card\s*)(\d{4,5})\b'

PARTIAL_SSN:
  - '(?i)(?:last 4 of social|last 4 of ssn)\s*:?\s*(\d{4})\b'
  - '(?i)(?:ssn\s*:?\s*)([xX*]{3}-[xX*]{2}-\d{4})\b'

INCOME:
  - '(?i)(?:make|earn|salary|income|pay|compensation|revenue|earnings|gross|net)[^\$]*(\$\s*\d{1,3}(?:,\d{3})*(?:\.\d{2})?(?:\s*a\s*year|\s*annually|\s*per\s*year|\s*per\s*month|\s*a\s*month|\s*per\s*week|\s*a\s*week|\s*K|k)?)'
  - '(?i)(\$\s*\d{1,3}(?:,\d{3})*(?:\.\d{2})?(?:k|K)?\s*(?:a\s*year|annually|per\s*year|per\s*month|a\s*month|per\s*week|a\s*week))'

DATE_OF_BIRTH:
  - '(?i)(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2}(?:st|nd|rd|th)?,?\s+\d{4}'
  - '(?i)\d{1,2}(?:st|nd|rd|th)?\s+(?:of\s+)?(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?),?\s+\d{4}'
  - '\b(?:\d{4}[-/]\d{1,2}[-/]\d{1,2})\b'

# Fixed: Added a lookahead (?=[A-Z0-9]{5,20}\b) and forced \d to ensure it cannot match English words like "number"
PARTNER_ACCOUNT_NUMBER:
  - '(?i)(?:skymiles|honors|loyalty|partner\s*account(?:s|\s*number)?|frequent\s*flyer|rewards\s*number|member\s*id)\s*(?:is\s+|#\s*|:\s*|-|)?(?=[A-Z0-9]{5,20}\b)([A-Z0-9]*\d[A-Z0-9]*)\b'

UNKNOWN_IDENTIFIER:
  - '(?<!\d)(\d{7,18})(?!\d)' # Catches any random 7-18 digit number so ContextDetector can evaluate it